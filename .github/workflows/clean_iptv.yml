name: Nettoyage IPTV Automatique

on:
  schedule:
    - cron: '0 3 * * *' # S'exécute toutes les nuits à 3h du matin
  workflow_dispatch: # Permet de lancer le nettoyage manuellement

jobs:
  clean-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Force l'autorisation d'écriture directement dans le script
    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Télécharger et nettoyer la liste
        run: |
          # Téléchargement de la liste arabe officielle
          curl -s "https://github.io" > raw_list.m3u

          # Suppression stricte de toutes les lignes contenant EXTVLCOPT
          sed '/#EXTVLCOPT/d' raw_list.m3u > playlist_propre.m3u

          # Nettoyage
          rm raw_list.m3u

      - name: Enregistrer la liste propre sur GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Mise à jour et nettoyage automatique"
          file_pattern: 'playlist_propre.m3u'
