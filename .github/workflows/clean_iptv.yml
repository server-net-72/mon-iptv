yamlname: Nettoyage IPTV Automatique

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  clean-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Télécharger et nettoyer la liste
        run: |
          # Téléchargement sécurisé en simulant un vrai navigateur internet
          wget --user-agent="Mozilla/5.0" -O raw_list.m3u "https://github.io"

          # Vérification si le fichier n'est pas vide avant de nettoyer
          if [ -s raw_list.m3u ]; then
            sed '/#EXTVLCOPT/d' raw_list.m3u > playlist_propre.m3u
          else
            echo "Erreur : Le fichier téléchargé est vide !"
            exit 1
          fi

          # Nettoyage
          rm raw_list.m3u

      - name: Enregistrer la liste propre sur GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Mise à jour et nettoyage automatique"
          file_pattern: 'playlist_propre.m3u'
