name: Nettoyage IPTV Automatique

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  clean-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Télécharger et nettoyer la liste
        run: |
          # Tentative de téléchargement avec l'URL officielle de leur CDN
          curl -L -s "https://iptv-org.github.io/iptv/languages/ara.m3u" > raw_list.m3u

          # Si le fichier est vide, on utilise l'URL de secours brute de GitHub
          if [ ! -s raw_list.m3u ]; then
            curl -L -s "https://githubusercontent.com" > raw_list.m3u
          fi

          # Suppression stricte de toutes les lignes contenant EXTVLCOPT
          sed '/#EXTVLCOPT/d' raw_list.m3u > playlist_propre.m3u

          # Nettoyage du fichier temporaire
          rm raw_list.m3u

      - name: Enregistrer la liste propre sur GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Mise à jour et nettoyage automatique"
          file_pattern: 'playlist_propre.m3u'
